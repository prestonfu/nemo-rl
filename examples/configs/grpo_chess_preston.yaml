# GRPO chess training config — Nano v3 model with chess environment
grpo:
  num_prompts_per_step: 4
  num_generations_per_prompt: 8
  num_val_generations_per_prompt: 4
  max_rollout_turns: 1
  max_num_epochs: 1
  max_num_steps: 1000000
  normalize_rewards: true
  use_leave_one_out_baseline: true
  val_period: 0
  val_at_start: False
  val_at_end: False
  overlong_filtering: true
  max_val_samples: null
  val_batch_size: 256
  seed: 42
  async_grpo:
    enabled: false
    max_trajectory_age_steps: 1

  batch_multiplier: 1
  use_dynamic_sampling: False
  reward_shaping:
    enabled: False
  reward_scaling:
    enabled: False

  seq_logprob_error_threshold: 2

loss_fn:
  reference_policy_kl_penalty: 0
  reference_policy_kl_type: k3
  kl_input_clamp_value: null
  kl_output_clamp_value: null
  ratio_clip_min: 0.2
  ratio_clip_max: 0.28
  ratio_clip_c: null
  use_on_policy_kl_approximation: True
  use_importance_sampling_correction: True
  sequence_level_importance_ratios: False
  token_level_loss: True
  truncated_importance_sampling_ratio: null

checkpointing:
  enabled: true
  checkpoint_dir: "/scratch/preston/results/grpo-chess"
  metric_name: null
  higher_is_better: true
  keep_top_k: 1000000
  save_period: 100
  checkpoint_must_save_by: "99:00:00:00"
  save_optimizer: true

policy:
  model_name: "nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-BF16"
  tokenizer:
    name: ${policy.model_name}
  train_global_batch_size: 32
  train_micro_batch_size: 1
  logprob_batch_size: 1
  max_total_sequence_length: 4096
  precision: "bfloat16"
  logprob_chunk_size: 1024

  dtensor_cfg:
    _v2: true
    enabled: false
    cpu_offload: true
    sequence_parallel: false
    activation_checkpointing: true
    tensor_parallel_size: 1
    context_parallel_size: 1
    custom_parallel_plan: null
    env_vars:
      PYTORCH_CUDA_ALLOC_CONF: "max_split_size_mb:64"

  draft:
    enabled: false
    model_name: null
    loss_weight: 0.0
    num_layers: null
    aux_layer_indices: null

  megatron_cfg:
    enabled: true
    empty_unused_memory_level: 1
    activation_checkpointing: true
    bias_activation_fusion: False
    tensor_model_parallel_size: 8
    expert_tensor_parallel_size: 8
    expert_model_parallel_size: 1
    pipeline_model_parallel_size: 1
    num_layers_in_first_pipeline_stage: null
    num_layers_in_last_pipeline_stage: null
    context_parallel_size: 1
    pipeline_dtype: ${policy.precision}
    sequence_parallel: true
    freeze_moe_router: true
    moe_router_dtype: "fp32"
    moe_router_load_balancing_type: "none"
    moe_router_bias_update_rate: 1e-3
    moe_permute_fusion: true
    moe_enable_deepep: false
    moe_token_dispatcher_type: "alltoall"
    moe_aux_loss_coeff: 0.0
    moe_router_enable_expert_bias: true
    apply_rope_fusion: True
    defer_fp32_logits: True
    track_moe_metrics: True
    moe_per_layer_logging: True
    moe_shared_expert_overlap: false

    optimizer:
      optimizer: "adam"
      lr: 3e-6
      min_lr: 3e-6
      weight_decay: 0.0
      bf16: true
      fp16: false
      params_dtype: "float32"
      adam_beta1: 0.9
      adam_beta2: 0.999
      adam_eps: 1e-8
      sgd_momentum: 0.9
      clip_grad: ${policy.max_grad_norm}
      use_distributed_optimizer: true
      use_precision_aware_optimizer: true
      optimizer_cpu_offload: False
      optimizer_offload_fraction: 0

    scheduler:
      start_weight_decay: ${policy.megatron_cfg.optimizer.weight_decay}
      end_weight_decay: ${policy.megatron_cfg.optimizer.weight_decay}
      weight_decay_incr_style: "constant"
      lr_decay_style: "constant"
      lr_decay_iters: null
      lr_warmup_iters: 10
      lr_warmup_init: 3.0e-7

    distributed_data_parallel_config:
      grad_reduce_in_fp32: false
      overlap_grad_reduce: true
      overlap_param_gather: true
      average_in_collective: false
      use_custom_fsdp: false
      data_parallel_sharding_strategy: "optim_grads_params"

    env_vars: null

  dynamic_batching:
    enabled: False
    train_mb_tokens: ${mul:${policy.max_total_sequence_length}, ${policy.train_micro_batch_size}}
    logprob_mb_tokens: ${mul:${policy.max_total_sequence_length}, ${policy.logprob_batch_size}}
    sequence_length_round: 64

  sequence_packing:
    enabled: True
    train_mb_tokens: ${mul:${policy.max_total_sequence_length}, ${policy.train_micro_batch_size}}
    logprob_mb_tokens: ${mul:${policy.max_total_sequence_length}, ${policy.logprob_batch_size}}
    algorithm: "modified_first_fit_decreasing"
    sequence_length_round: 64

  make_sequence_length_divisible_by: 8
  max_grad_norm: 1.0

  optimizer: null
  scheduler: null

  offload_optimizer_for_logprob: False

  generation:
    backend: "vllm"
    max_new_tokens: ${policy.max_total_sequence_length}
    thinking_token_budget: 3072  # force </think> after this many generated tokens
    temperature: 1.0
    top_p: 1.0
    top_k: null
    stop_token_ids: null
    stop_strings: null
    vllm_cfg:
      async_engine: true
      kv_cache_dtype: auto
      precision: ${policy.precision}
      tensor_parallel_size: 8
      pipeline_parallel_size: 1
      expert_parallel_size: 1
      gpu_memory_utilization: 0.4
      max_model_len: ${policy.max_total_sequence_length}
      enforce_eager: False
      use_deep_gemm: False
      num_last_layers_in_bf16: 0
      num_first_layers_in_bf16: 0
      expose_http_server: true
    vllm_kwargs:
      mamba_ssm_cache_dtype: "float32"
      compilation_config:
        backend: eager
    colocated:
      enabled: true
      resources:
        gpus_per_node: null
        num_nodes: null

data:
  max_input_seq_length: null
  shuffle: False
  shuffle_positions: true
  num_workers: 1
  use_multiple_dataloader: false
  add_system_prompt: false
  task_name: "chess_one_step"
  prompt_style: "guided"  # one of: guided, plain, compact, json
  prompt_template: null
  train:
    data_path: "examples/data/chess_positions_train.jsonl"
  validation: null
  default:
    env_name: "chess"

env:
  chess:
    stockfish_path: "/root/stockfish"
    analysis_depth: 15
    illegal_move_penalty: 1000.0
    mate_bonus: 1000.0

logger:
  log_dir: "/scratch/preston/logs"
  num_val_samples_to_print: 0
  num_train_samples_to_print: 1
  wandb_enabled: true
  tensorboard_enabled: false
  mlflow_enabled: false
  monitor_gpus: true
  swanlab_enabled: false
  wandb:
    project: "nemo-rl"
    name: "grpo-chess"
    entity: "prestonfu"
  tensorboard: {}
  mlflow:
    experiment_name: "grpo-dev"
    run_name: "grpo-dev-logger"
  gpu_monitoring:
    collection_interval: 10
    flush_interval: 10

cluster:
  gpus_per_node: 8
  num_nodes: 1
