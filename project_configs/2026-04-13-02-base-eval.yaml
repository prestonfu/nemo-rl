# Math evaluation Configuration
defaults: "../examples/configs/evals/eval.yaml"

# uv run examples/run_eval.py --config project_configs/2026-04-13-02-base-eval.yaml

eval:
  metric: "pass@k"

generation:
  model_name: "Qwen/Qwen3-4B" # "Qwen/Qwen3-1.7B-Base"
  tokenizer:
        name: ${..model_name}

data:
  prompt_file: "examples/prompts/cot.txt"
  dataset_name: "math"

execution:
  output_dir: /scratch/jennifer/results/2026-04-13-02-base-eval/

export:
  wandb:
    entity: jnzhao3
    project: qwen_evals
    name: base_math

